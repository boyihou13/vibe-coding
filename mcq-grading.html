<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦閱卷系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        #error-msg {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }
        /* 結果輸出區塊：使用等寬字體以確保上下對齊 */
        .result-box {
            margin-top: 20px;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            display: none; /* 初始隱藏 */
        }
        pre {
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            margin: 0;
            line-height: 1.5;
        }
        .info-text {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 電腦閱卷系統</h1>
    <p class="info-text">提示：標準答案僅接受 A-D。考生答案接受 A-D，若未作答請輸入「?」。其餘空白或雜字將自動過濾。</p>
    
    <div class="input-group">
        <label for="std-ans">標準答案：</label>
        <textarea id="std-ans" placeholder="請貼上標準答案..."></textarea>
    </div>
    
    <div class="input-group">
        <label for="stu-ans">考生答案：</label>
        <textarea id="stu-ans" placeholder="請貼上考生答案..."></textarea>
    </div>
    
    <button class="btn" onclick="gradeAnswers()">開始批改</button>
    
    <div id="error-msg"></div>
    
    <div class="result-box" id="result-box">
        <pre id="output"></pre>
    </div>
</div>

<script>
    // 清洗字串邏輯 (等同 Python 的 re.sub)
    function sanitizeInput(text, isStudent) {
        let cleaned;
        if (isStudent) {
            // 允許 A-D, a-d, 以及 ?
            cleaned = text.replace(/[^A-Da-d?]/g, '');
        } else {
            // 僅允許 A-D, a-d
            cleaned = text.replace(/[^A-Da-d]/g, '');
        }
        return cleaned.toUpperCase();
    }

    // 主要批改邏輯
    function gradeAnswers() {
        const stdRaw = document.getElementById('std-ans').value;
        const stuRaw = document.getElementById('stu-ans').value;
        const errorMsg = document.getElementById('error-msg');
        const resultBox = document.getElementById('result-box');
        const outputPre = document.getElementById('output');

        // 隱藏先前的結果與錯誤訊息
        errorMsg.innerText = '';
        resultBox.style.display = 'none';

        // 1. 資料清洗
        const stdAns = sanitizeInput(stdRaw, false);
        const stuAns = sanitizeInput(stuRaw, true);

        if (!stdAns || !stuAns) {
            errorMsg.innerText = "【錯誤】輸入內容無法辨識有效答案，請重新確認。";
            return;
        }

        // 2. 檢核長度
        if (stdAns.length !== stuAns.length) {
            errorMsg.innerText = `【錯誤】長度不一致！標準答案共 ${stdAns.length} 題，考生答案共 ${stuAns.length} 題。請檢查是否有漏劃記或多餘字元。`;
            return;
        }

        // 3. 批改與計分
        const totalQ = stdAns.length;
        let correctCount = 0;
        let stdRow = [];
        let stuRow = [];

        for (let i = 0; i < totalQ; i++) {
            if (stdAns[i] === stuAns[i]) {
                correctCount++;
                stdRow.push('-');
                stuRow.push('-');
            } else {
                stdRow.push(stdAns[i]);
                stuRow.push(stuAns[i]);
            }
        }

        // 計算分數：(答對/總數) * 100，四捨五入到小數點第二位
        const score = ((correctCount / totalQ) * 100).toFixed(2);

        // 4. 排版準備
        let displayLen = Math.ceil(totalQ / 10) * 10;
        if (displayLen === 0) displayLen = 10;

        let tensRowChars = [];
        let onesRowChars = [];

        for (let i = 0; i < displayLen; i++) {
            // 十位數邏輯
            if (i === 0) {
                tensRowChars.push('0');
            } else if ((i + 1) % 10 === 0) {
                tensRowChars.push(Math.floor((i + 1) / 10).toString());
            } else {
                tensRowChars.push(' ');
            }
            
            // 個位數邏輯
            onesRowChars.push(((i + 1) % 10).toString());
        }

        const tensStr = tensRowChars.join('');
        const onesStr = onesRowChars.join('');
        
        // 組合答案字串並補足空白
        const stdStr = stdRow.join('') + ' '.repeat(displayLen - totalQ);
        const stuStr = stuRow.join('') + ' '.repeat(displayLen - totalQ);

        // 5. 組合最終輸出字串
        const separatorLength = 15 + displayLen;
        const separator = '='.repeat(separatorLength);
        const dashLine = '-'.repeat(separatorLength);

        let finalOutput = `${separator}\n`;
        finalOutput += `【閱卷結果】 總題數: ${totalQ} 題 | 答對: ${correctCount} 題 | 分數: ${score} 分\n`;
        finalOutput += `${dashLine}\n`;
        finalOutput += `題號(十位) | ${tensStr}\n`;
        finalOutput += `題號(個位) | ${onesStr}\n`;
        finalOutput += `${dashLine}\n`;
        finalOutput += `標準答案   | ${stdStr}\n`;
        finalOutput += `考生答案   | ${stuStr}\n`;
        finalOutput += `${separator}\n`;

        // 顯示結果
        outputPre.innerText = finalOutput;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
