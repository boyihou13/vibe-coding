<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦閱卷系統</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        textarea { width: 100%; height: 80px; padding: 10px; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        .btn { display: block; width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: #2980b9; }
        #error-msg { color: #e74c3c; font-weight: bold; margin-top: 15px; text-align: center; }
        /* 結果輸出區塊：使用等寬字體以確保上下對齊 */
        .result-box { margin-top: 20px; background-color: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 4px; overflow-x: auto; display: none; }
        pre { font-family: "Courier New", Courier, monospace; font-size: 16px; margin: 0; line-height: 1.5; }
        .info-text { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 電腦閱卷系統 v2.0</h1>
    <p class="info-text">提示：標準答案僅接受 A-D。考生答案接受 A-D，若未作答請輸入「?」。支援百題以上對齊。</p>
    
    <div class="input-group">
        <label for="std-ans">標準答案：</label>
        <textarea id="std-ans" placeholder="請貼上標準答案..."></textarea>
    </div>
    
    <div class="input-group">
        <label for="stu-ans">考生答案：</label>
        <textarea id="stu-ans" placeholder="請貼上考生答案..."></textarea>
    </div>
    
    <button class="btn" onclick="gradeAnswers()">開始批改</button>
    
    <div id="error-msg"></div>
    
    <div class="result-box" id="result-box">
        <pre id="output"></pre>
    </div>
</div>

<script>
    function sanitizeInput(text, isStudent) {
        let cleaned;
        if (isStudent) {
            cleaned = text.replace(/[^A-Da-d?]/g, '');
        } else {
            cleaned = text.replace(/[^A-Da-d]/g, '');
        }
        return cleaned.toUpperCase();
    }

    function gradeAnswers() {
        const stdRaw = document.getElementById('std-ans').value;
        const stuRaw = document.getElementById('stu-ans').value;
        const errorMsg = document.getElementById('error-msg');
        const resultBox = document.getElementById('result-box');
        const outputPre = document.getElementById('output');

        errorMsg.innerText = '';
        resultBox.style.display = 'none';

        // 1. 資料清洗
        const stdAns = sanitizeInput(stdRaw, false);
        const stuAns = sanitizeInput(stuRaw, true);

        if (!stdAns || !stuAns) {
            errorMsg.innerText = "【錯誤】輸入內容無法辨識有效答案，請重新確認。";
            return;
        }

        // 2. 檢核長度
        if (stdAns.length !== stuAns.length) {
            errorMsg.innerText = `【錯誤】長度不一致！標準答案共 ${stdAns.length} 題，考生答案共 ${stuAns.length} 題。`;
            return;
        }

        // 3. 批改與計分
        const totalQ = stdAns.length;
        let correctCount = 0;
        let stdRow = [];
        let stuRow = [];

        for (let i = 0; i < totalQ; i++) {
            if (stdAns[i] === stuAns[i]) {
                correctCount++;
                stdRow.push('-');
                stuRow.push('-');
            } else {
                stdRow.push(stdAns[i]);
                stuRow.push(stuAns[i]);
            }
        }
        const score = ((correctCount / totalQ) * 100).toFixed(2);

        // 4. 排版準備 (修正邏輯)
        let displayLen = Math.ceil(totalQ / 10) * 10;
        if (displayLen === 0) displayLen = 10;

        // 4.1 建立個位數列 (0-9 循環)
        let onesRowChars = [];
        for (let i = 0; i < displayLen; i++) {
            onesRowChars.push(((i + 1) % 10).toString());
        }

        // 4.2 建立十位數列 (先填滿空白，再定點覆寫)
        // 建立一個充滿空白字元的陣列
        let tensRowChars = new Array(displayLen).fill(' ');

        // 處理第 1 題 (Index 0) 的特殊標記 '0'
        tensRowChars[0] = '0';

        // 處理第 10, 20, 30... 題 (Index 9, 19, 29...)
        // 迴圈從 9 開始 (第10題)，每次加 10
        for (let i = 9; i < displayLen; i += 10) {
            // 計算標籤數值，例如 i=99 時，label="10"
            let label = ((i + 1) / 10).toString();
            
            // 將 label 的每個字元依序寫入陣列，覆蓋原本的空白
            // 例子：第100題 (i=99), label="10"
            // tensRowChars[99] = '1'
            // tensRowChars[100] = '0'
            for (let j = 0; j < label.length; j++) {
                // 確保不超出陣列範圍
                if (i + j < displayLen) {
                    tensRowChars[i + j] = label[j];
                }
            }
        }

        const tensStr = tensRowChars.join('');
        const onesStr = onesRowChars.join('');
        
        // 組合答案字串並補足空白
        const stdStr = stdRow.join('') + ' '.repeat(displayLen - totalQ);
        const stuStr = stuRow.join('') + ' '.repeat(displayLen - totalQ);

        // 5. 組合最終輸出
        const separatorLength = 15 + displayLen;
        const separator = '='.repeat(separatorLength);
        const dashLine = '-'.repeat(separatorLength);

        let finalOutput = `${separator}\n`;
        finalOutput += `【閱卷結果】 總題數: ${totalQ} 題 | 答對: ${correctCount} 題 | 分數: ${score} 分\n`;
        finalOutput += `${dashLine}\n`;
        finalOutput += `題號(十位) | ${tensStr}\n`;
        finalOutput += `題號(個位) | ${onesStr}\n`;
        finalOutput += `${dashLine}\n`;
        finalOutput += `標準答案   | ${stdStr}\n`;
        finalOutput += `考生答案   | ${stuStr}\n`;
        finalOutput += `${separator}\n`;

        outputPre.innerText = finalOutput;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
